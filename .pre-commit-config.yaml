# Pre-commit hooks for trading system
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Syntax checks (catches imports inside functions)
      - id: ruff
        args: [--select, E, F, --fix]
        name: ruff syntax check

      # Format checks
      - id: ruff-format
        name: ruff format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Basic sanity checks
      - id: check-yaml
        name: check yaml syntax
      - id: check-json
        name: check json syntax
      - id: end-of-file-fixer
        name: fix end of files
      - id: trailing-whitespace
        name: remove trailing whitespace

      # Python-specific
      - id: check-ast
        name: check python AST (catches syntax errors)
      - id: check-docstring-first
        name: check docstring comes before code
