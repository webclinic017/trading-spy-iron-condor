name: Trigger.dev Tests

on:
  push:
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "package.json"
      - "tsconfig.json"
      - "vitest.config.ts"
  pull_request:
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "package.json"
      - "tsconfig.json"
      - "vitest.config.ts"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
