name: Alpaca Portfolio Snapshot

on:
  schedule:
    # Daily at 5pm ET (22:00 UTC during EST, 21:00 UTC during EDT)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install alpaca-py matplotlib pillow

      - name: Generate snapshots
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          ALPACA_BROKERAGE_TRADING_API_KEY: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_KEY }}
          ALPACA_BROKERAGE_TRADING_API_SECRET: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_SECRET }}
          PYTHONPATH: .
        run: python scripts/generate_alpaca_snapshot.py

      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p docs/assets/snapshots
          git add docs/assets/snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore: daily portfolio snapshot $(date +%Y-%m-%d)"
            git pull --rebase origin main || git rebase --abort
            git push origin HEAD:main
          fi
