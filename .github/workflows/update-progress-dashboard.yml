name: Update Progress Dashboard

on:
  schedule:
    # Run every hour during market hours (9 AM - 5 PM ET, M-F)
    # EST: UTC-5, so 14:00-22:00 UTC
    - cron: "0 14-22 * * 1-5"
    # Also run daily at 6 AM ET (11:00 UTC) to keep dashboard fresh
    - cron: "0 11 * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/system_state.json"
      - "scripts/generate_world_class_dashboard*.py"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync Alpaca data first
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          echo "📊 Syncing latest Alpaca data..."
          # Use the correct sync script name
          python3 scripts/sync_alpaca_state.py || {
            echo "⚠️ sync_alpaca_state.py failed, trying sync_trades_from_alpaca.py..."
            python3 scripts/sync_trades_from_alpaca.py || echo "⚠️ Trade sync failed - dashboard may show stale data"
          }

      - name: Sync closed positions for win rate
        run: |
          echo "📊 Syncing closed positions for win rate calculation..."
          python3 scripts/sync_closed_positions.py || echo "⚠️ Closed positions sync failed - win rate may be stale"
          echo "✅ Closed positions synced"

      - name: Generate Progress Dashboard
        run: |
          echo "📊 Generating enhanced progress dashboard..."
          python3 scripts/generate_world_class_dashboard_enhanced.py || python3 scripts/generate_world_class_dashboard.py
          echo "✅ Dashboard generated"

          # Show preview
          head -50 wiki/Progress-Dashboard.md

      - name: Update GitHub Pages index
        run: |
          echo "📊 Updating docs/index.md..."
          python3 scripts/update_docs_index.py
          echo "✅ GitHub Pages index updated"

      - name: Update GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Updating GitHub Wiki..."

          # Clone wiki
          WIKI_DIR="wiki_repo"
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/IgorGanapolsky/trading.wiki.git "$WIKI_DIR" || {
            echo "Creating new wiki..."
            mkdir -p "$WIKI_DIR"
            cd "$WIKI_DIR"
            git init
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/IgorGanapolsky/trading.wiki.git"
            cd ..
          }

          # Copy dashboard
          cp wiki/Progress-Dashboard.md "$WIKI_DIR/Progress-Dashboard.md"
          [ -f wiki/Home.md ] && cp wiki/Home.md "$WIKI_DIR/Home.md"

          # Commit and push
          cd "$WIKI_DIR"
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A

          if git diff --staged --quiet 2>/dev/null; then
            echo "📋 No changes to dashboard"
          else
            git commit -m "📊 Auto-update dashboard - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin master || git push origin main || {
              echo "⚠️ Push failed, trying force push..."
              git push -f origin master || git push -f origin main
            }
            echo "✅ Wiki updated successfully!"
          fi

      - name: Commit system state changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/system_state.json wiki/ docs/index.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: Sync dashboard data [auto]"
            git push || echo "Push to main skipped (no changes or protected)"
          fi
