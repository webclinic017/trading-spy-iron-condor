name: Update Progress Dashboard

on:
  schedule:
    # Run every hour during market hours (9 AM - 5 PM ET, M-F)
    # EST: UTC-5, so 14:00-22:00 UTC
    - cron: "0 14-22 * * 1-5"
    # Also run daily at 6 AM ET (11:00 UTC) to keep dashboard fresh
    - cron: "0 11 * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/system_state.json"
      - "scripts/generate_world_class_dashboard*.py"
      - "scripts/update_docs_index.py"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'Sync dashboard data [auto]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests alpaca-py python-dotenv

      - name: Sync Alpaca data first
        if: ${{ github.event_name != 'push' }}
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          ALPACA_BROKERAGE_TRADING_API_KEY: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_KEY }}
          ALPACA_BROKERAGE_TRADING_API_SECRET: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_SECRET }}
          REQUIRE_ALPACA_KEYS: "true"
        run: |
          echo "📊 Syncing latest Alpaca data..."
          python3 scripts/sync_alpaca_state.py

      - name: Sync closed positions for win rate
        if: ${{ github.event_name != 'push' }}
        run: |
          echo "📊 Syncing closed positions for win rate calculation..."
          python3 scripts/sync_closed_positions.py || echo "⚠️ Closed positions sync failed - win rate may be stale"
          echo "✅ Closed positions synced"

      - name: Update AI credit stress signal
        run: |
          echo "📉 Refreshing AI credit stress regime signal..."
          python3 scripts/update_ai_credit_stress_signal.py \
            --out data/market_signals/ai_credit_stress_signal.json \
            --state data/system_state.json \
            --sync-state \
            --max-stale-days 7
          echo "✅ AI credit stress signal updated"

      - name: Update North Star operating plan
        run: |
          echo "🎯 Updating weekly gate + contribution plan..."
          python3 scripts/update_north_star_operating_plan.py
          echo "✅ North Star operating plan updated"

      - name: Weekly cadence KPI + no-trade diagnostic
        run: |
          echo "📈 Checking cadence KPI and no-trade diagnostic..."
          python3 scripts/check_weekly_cadence_gate.py \
            --state data/system_state.json \
            --out artifacts/devloop/weekly_cadence_kpi.md \
            --emit-github-warning \
            --fail-on none
          echo "✅ Cadence diagnostic generated"

      - name: Mirror workspace evidence to Box (manifest + optional sync)
        env:
          BOX_ACCESS_TOKEN: ${{ secrets.BOX_ACCESS_TOKEN }}
          BOX_ROOT_FOLDER_ID: ${{ secrets.BOX_ROOT_FOLDER_ID }}
          BOX_WORKSPACE_NAMESPACE: trading-agent-workspace
        run: |
          echo "📦 Building Box workspace mirror manifest..."
          python3 scripts/box_workspace_mirror.py \
            --repo-root . \
            --manifest-out artifacts/devloop/box_workspace_manifest.json \
            --state data/system_state.json \
            --sync-state \
            --sync-if-credentials
          echo "✅ Box workspace mirror completed"

      - name: Generate Progress Dashboard
        run: |
          echo "📊 Generating enhanced progress dashboard..."
          python3 scripts/generate_world_class_dashboard_enhanced.py || python3 scripts/generate_world_class_dashboard.py
          echo "✅ Dashboard generated"

          # Show preview
          head -50 wiki/Progress-Dashboard.md

      - name: Generate Judge and Ops pages
        run: |
          echo "🧪 Generating judge and ops evidence pages..."
          python3 scripts/generate_judge_demo_page.py --repo-root . --out docs/lessons/judge-demo.html
          python3 scripts/generate_ops_status_page.py --repo-root . --out docs/lessons/ops-status.html
          echo "✅ Judge/Ops pages generated"

      - name: Generate static dashboard snapshot report
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "🧾 Generating crawlable dashboard snapshot..."
          python3 scripts/generate_dashboard_snapshot.py \
            --state data/system_state.json \
            --dashboard wiki/Progress-Dashboard.md \
            --out-dir docs/_reports
          echo "✅ Dashboard snapshot generated"

      - name: Check AI discoverability KPIs
        run: |
          echo "🔎 Evaluating AI discoverability KPIs..."
          python3 scripts/check_ai_discoverability.py \
            --repo-root . \
            --report artifacts/devloop/ai_discoverability_report.md \
            --json-out artifacts/devloop/ai_discoverability_report.json \
            --state data/system_state.json \
            --sync-state \
            --fail-on none
          echo "✅ AI discoverability report generated"

      - name: Update GitHub Pages index
        run: |
          echo "📊 Updating docs/index.md..."
          python3 scripts/update_docs_index.py
          echo "✅ GitHub Pages index updated"

      - name: Update GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Updating GitHub Wiki..."

          # Clone wiki
          WIKI_DIR="wiki_repo"
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/IgorGanapolsky/trading.wiki.git "$WIKI_DIR" || {
            echo "Creating new wiki..."
            mkdir -p "$WIKI_DIR"
            cd "$WIKI_DIR"
            git init
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/IgorGanapolsky/trading.wiki.git"
            cd ..
          }

          # Copy dashboard
          cp wiki/Progress-Dashboard.md "$WIKI_DIR/Progress-Dashboard.md"
          [ -f wiki/Home.md ] && cp wiki/Home.md "$WIKI_DIR/Home.md"

          # Commit and push
          cd "$WIKI_DIR"
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A

          if git diff --staged --quiet 2>/dev/null; then
            echo "📋 No changes to dashboard"
          else
            git commit -m "📊 Auto-update dashboard - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin master || git push origin main || {
              echo "⚠️ Push failed, trying force push..."
              git push -f origin master || git push -f origin main
            }
            echo "✅ Wiki updated successfully!"
          fi

      - name: Commit system state changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/system_state.json data/north_star_weekly_history.json data/trades.json data/market_signals/ai_credit_stress_signal.json artifacts/devloop/box_workspace_manifest.json artifacts/devloop/ai_discoverability_report.md artifacts/devloop/ai_discoverability_report.json wiki/ docs/index.md docs/_reports/*-dashboard-snapshot.md docs/lessons/judge-demo.html docs/lessons/ops-status.html 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: Sync dashboard data [auto]"
            if [ -n "${{ secrets.GH_PAT }}" ]; then
              git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"
            fi
            git push origin HEAD:main || echo "Push to main skipped (no changes or protected)"
          fi
