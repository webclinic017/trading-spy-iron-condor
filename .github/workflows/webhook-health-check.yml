name: Webhook Health Check

on:
  # Run after webhook deployment
  workflow_run:
    workflows: ["Deploy RAG Webhook"]
    types: [completed]
  # DISABLED Jan 23, 2026 - Cost reduction ($200/month GCP bill)
  # schedule:
  #   - cron: '0 15 * * 1-5'  # 10 AM ET on trading days
  workflow_dispatch:

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  health-check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    env:
      RAG_WEBHOOK_URL: ${{ vars.RAG_WEBHOOK_URL }}
      RAG_WEBHOOK_URL_SECRET: ${{ secrets.RAG_WEBHOOK_URL }}

    steps:
      - name: Check Webhook Health
        id: health
        run: |
          echo "🔍 Checking webhook health..."

          BASE_URL="${RAG_WEBHOOK_URL:-$RAG_WEBHOOK_URL_SECRET}"
          if [ -z "$BASE_URL" ]; then
            echo "::warning::RAG_WEBHOOK_URL not set; skipping health check"
            exit 0
          fi

          HEALTH_URL="$BASE_URL/health"
          RESPONSE=$(curl -s "$HEALTH_URL")

          echo "Response: $RESPONSE"

          # Parse response
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          TRADES_LOADED=$(echo "$RESPONSE" | jq -r '.trades_loaded')
          RAG_MODE=$(echo "$RESPONSE" | jq -r '.rag_mode')
          RAG_LAST_SOURCE=$(echo "$RESPONSE" | jq -r '.rag_last_source')

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "trades_loaded=$TRADES_LOADED" >> $GITHUB_OUTPUT
          echo "rag_mode=$RAG_MODE" >> $GITHUB_OUTPUT
          echo "rag_last_source=$RAG_LAST_SOURCE" >> $GITHUB_OUTPUT

          # Validation
          FAILED=false

          if [ "$STATUS" != "healthy" ]; then
            echo "❌ FAIL: Status is '$STATUS', expected 'healthy'"
            FAILED=true
          else
            echo "✅ Status: healthy"
          fi

          if [ "$TRADES_LOADED" = "0" ] || [ "$TRADES_LOADED" = "null" ]; then
            echo "❌ FAIL: trades_loaded is $TRADES_LOADED - DATA SOURCE MISMATCH!"
            echo "This indicates the webhook cannot find trade data."
            echo "Check: system_state.json -> trade_history must be populated"
            FAILED=true
          else
            echo "✅ Trades loaded: $TRADES_LOADED"
          fi

          if [ "$RAG_MODE" != "lancedb_first" ]; then
            echo "❌ FAIL: RAG mode is '$RAG_MODE' (expected lancedb_first)"
            FAILED=true
          else
            echo "✅ RAG mode: lancedb_first"
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "🚨 WEBHOOK HEALTH CHECK FAILED"
            echo "See LL-230 for debugging data source issues"
            exit 1
          fi

          echo ""
          echo "✅ All health checks passed"

      - name: Test Trade Query
        if: success()
        run: |
          echo "🔍 Testing trade query endpoint..."

          BASE_URL="${RAG_WEBHOOK_URL:-$RAG_WEBHOOK_URL_SECRET}"
          if [ -z "$BASE_URL" ]; then
            echo "::warning::RAG_WEBHOOK_URL not set; skipping trade query test"
            exit 0
          fi

          TEST_URL="$BASE_URL/test-trades"
          RESPONSE=$(curl -s "$TEST_URL")

          RESULTS_COUNT=$(echo "$RESPONSE" | jq -r '.results_count')

          if [ "$RESULTS_COUNT" = "0" ] || [ "$RESULTS_COUNT" = "null" ]; then
            echo "❌ FAIL: Trade query returned 0 results"
            exit 1
          fi

          echo "✅ Trade query returned $RESULTS_COUNT trades"

      - name: Test RAG Query (LanceDB)
        if: success()
        run: |
          echo "🔍 Testing RAG query endpoint..."

          BASE_URL="${RAG_WEBHOOK_URL:-$RAG_WEBHOOK_URL_SECRET}"
          if [ -z "$BASE_URL" ]; then
            echo "::warning::RAG_WEBHOOK_URL not set; skipping RAG query test"
            exit 0
          fi

          TEST_URL="$BASE_URL/test"
          RESPONSE=$(curl -s "$TEST_URL")

          RAG_SOURCE=$(echo "$RESPONSE" | jq -r '.rag_source')
          RESULTS_COUNT=$(echo "$RESPONSE" | jq -r '.results_count')

          if [ "$RESULTS_COUNT" = "0" ] || [ "$RESULTS_COUNT" = "null" ]; then
            echo "❌ FAIL: RAG query returned 0 results"
            exit 1
          fi

          if [ "$RAG_SOURCE" != "lancedb" ]; then
            echo "❌ FAIL: RAG source is '$RAG_SOURCE' (expected lancedb)"
            exit 1
          fi

          echo "✅ RAG query returned $RESULTS_COUNT results (source: $RAG_SOURCE)"

      - name: Summary
        if: always()
        run: |
          echo "## Webhook Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.health.outputs.status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trades Loaded | ${{ steps.health.outputs.trades_loaded || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RAG Mode | ${{ steps.health.outputs.rag_mode || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RAG Last Source | ${{ steps.health.outputs.rag_last_source || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
