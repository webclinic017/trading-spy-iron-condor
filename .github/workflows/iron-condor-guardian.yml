name: Iron Condor Guardian - Phil Town Rule #1

on:
  schedule:
    # Run every 30 minutes during market hours (9:30 AM - 4:00 PM ET)
    # UTC times: 14:30 - 21:00 (EST) or 13:30 - 20:00 (EDT)
    - cron: 0,30 14-21 * * 1-5
  workflow_dispatch:

# Prevent concurrent trade execution (LL-281 race condition fix)
concurrency:
  group: global-trade-execution
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  guardian:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-minimal.txt

      - name: Run Iron Condor Guardian
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/iron_condor_guardian.py

      - name: Upload guardian log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: guardian-log-${{ github.run_id }}
          path: data/ic_entries.json
          retention-days: 30
