name: Cross-Publish Blog Post

on:
  workflow_dispatch:
    inputs:
      post_file:
        description: "Path to markdown post (e.g. docs/_posts/2026-02-15-my-post.md)"
        required: true
        type: string
      platform:
        description: "Platform to publish to"
        required: true
        type: choice
        options:
          - all
          - devto
          - linkedin
        default: all

permissions:
  contents: read

jobs:
  cross-publish:
    name: Publish to ${{ inputs.platform }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Publish post
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          python scripts/cross_publish.py \
            "${{ inputs.post_file }}" \
            --platform "${{ inputs.platform }}"
