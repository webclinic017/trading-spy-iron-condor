name: Auto Create PR

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write
  pull-requests: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git log comparison

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pyyaml

      - name: Agent handoff gate (autonomous)
        run: |
          python3 scripts/agent_handoff_gate.py \
            --base-ref origin/main \
            --mode quick \
            --report-md artifacts/devloop/agent_handoff_gate.md \
            --report-json artifacts/devloop/agent_handoff_gate.json \
            --delegation-contract-out artifacts/devloop/delegation_contract.json \
            --fallback-plan-json artifacts/devloop/handoff_fallback_plan.json \
            --audit-jsonl artifacts/devloop/agent_handoff_audit.jsonl

      - name: Upload handoff gate report
        uses: actions/upload-artifact@v4
        with:
          name: agent-handoff-gate
          path: |
            artifacts/devloop/agent_handoff_gate.md
            artifacts/devloop/agent_handoff_gate.json
            artifacts/devloop/delegation_contract.json
            artifacts/devloop/handoff_fallback_plan.json
            artifacts/devloop/agent_handoff_audit.jsonl

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            # Get branch name and latest commit message for dynamic title
            BRANCH_NAME="${{ github.ref_name }}"
            COMMIT_MSG=$(git log -1 --format=%s)

            # Create PR with dynamic title from commit message
            GATE_SUMMARY=$(cat artifacts/devloop/agent_handoff_gate.md 2>/dev/null || echo "Gate report unavailable.")
            gh pr create \
              --title "$COMMIT_MSG" \
              --body "## Summary
          Auto-generated PR from branch: \`$BRANCH_NAME\`

          ## Changes
          $(git log origin/main..HEAD --oneline | head -10)

          ## Test Plan
          - [ ] CI passes
          - [ ] Manual verification if needed

          ## Agent Handoff Gate
          \`\`\`markdown
          $GATE_SUMMARY
          \`\`\`" \
              --base main
            echo "PR created successfully"
          else
            echo "PR #$EXISTING_PR already exists"
          fi

      - name: Auto-merge if tests pass
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --squash --auto --delete-branch || echo "Auto-merge enabled"
          fi
