name: Devloop Continuous

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

# DISABLED: Local dev workflow, not CI. Debt audit Feb 2026.
permissions:
  contents: write

jobs:
  devloop:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run one continuous devloop cycle
        env:
          MAX_CYCLES: "1"
          INTERVAL_SECONDS: "1"
          FULL_EVERY: "1"
          RUN_TARS: "0"
        run: |
          ./scripts/continuous_devloop.sh once

      - name: Commit artifact updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/devloop/tasks.md artifacts/devloop/profit_readiness_scorecard.md artifacts/devloop/kpi_page.md artifacts/devloop/next_copilot_prompt.md artifacts/devloop/kpi_priority_report.md artifacts/devloop/kpi_priority.json artifacts/devloop/kpi_priority_state.json artifacts/devloop/layer_expansion_report.md artifacts/devloop/rag_status.md artifacts/devloop/rag_refresh.log artifacts/devloop/status.txt manual_layer1_tasks.md config/manual_layer1_tasks.md data/rag/lessons_query.json docs/data/rag/lessons_query.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: continuous devloop artifact refresh"
            git push
          fi
