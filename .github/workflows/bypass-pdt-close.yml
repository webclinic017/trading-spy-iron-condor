name: EMERGENCY - Bypass PDT and Close Positions

on:
  workflow_dispatch:

# DISABLED: PDT workflows irrelevant at $100K (no PDT restrictions). Debt audit Feb 2026.

# Prevent concurrent trade execution (LL-281 race condition fix)
concurrency:
  group: global-trade-execution
  cancel-in-progress: false

permissions:
  contents: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  bypass-pdt-close:
    if: false
    name: Bypass PDT Protection and Close
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Bypass PDT and Close Positions
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: python3 scripts/bypass_pdt_close.py

      - name: Sync State After Close
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-alpaca-status.yml/dispatches" \
            -d '{"ref": "main"}'
