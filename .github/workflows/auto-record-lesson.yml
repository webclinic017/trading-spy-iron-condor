name: Auto Record Lesson on Failure

on:
  workflow_run:
    workflows:
      - "Execute Credit Spread"
      - "Close Non-SPY Positions"
      - "Auto Position Compliance Check"
      - "Emergency Close SOFI Position"
    types:
      - completed

permissions:
  contents: read

jobs:
  record-lesson:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect failure details
        id: failure
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p artifacts/rlhf
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          WORKFLOW_SLUG=$(printf '%s' "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')

          gh run view "$RUN_ID" --log-failed 2>/dev/null | head -100 > artifacts/rlhf/failure-log.txt || \
            echo "Could not fetch failed log lines for $RUN_ID" > artifacts/rlhf/failure-log.txt

          ERROR_MSG=$(grep -i "error\|failed\|denied\|exception" artifacts/rlhf/failure-log.txt | head -5 | tr '\n' ' ' | cut -c1-500)

          echo "workflow_name=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "workflow_slug=$WORKFLOW_SLUG" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "error_msg=$ERROR_MSG" >> "$GITHUB_OUTPUT"

      - name: Capture failure through MCP Memory Gateway
        run: |
          mkdir -p .rlhf
          CONTEXT="${{ steps.failure.outputs.workflow_name }} failed in CI: ${{ steps.failure.outputs.run_url }}"
          ERROR_MSG="${{ steps.failure.outputs.error_msg }}"

          npx -y mcp-memory-gateway@0.7.1 capture \
            --feedback=down \
            --context="$CONTEXT" \
            --what-went-wrong="${ERROR_MSG:-Workflow failed without a concise extracted error message.}" \
            --what-to-change="Fix the workflow root cause, verify the failing path locally, and re-run the workflow before the next trading session." \
            --tags="workflow-failure,ci,${{ steps.failure.outputs.workflow_slug }}" || true

          npx -y mcp-memory-gateway@0.7.1 rules \
            --output=.rlhf/prevention-rules.md \
            --min=2 || true

      - name: Write workflow summary
        run: |
          {
            echo "## Failure Captured"
            echo ""
            echo "- Workflow: ${{ steps.failure.outputs.workflow_name }}"
            echo "- Run URL: ${{ steps.failure.outputs.run_url }}"
            echo "- Gateway capture: attempted via \`mcp-memory-gateway@0.7.1\`"
            echo "- Artifact: \`.rlhf/\` plus extracted failure log"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload RLHF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-record-lesson-rlhf
          path: |
            .rlhf/
            artifacts/rlhf/failure-log.txt
