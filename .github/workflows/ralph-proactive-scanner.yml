name: Ralph Proactive Scanner

# Proactive problem detection - finds issues BEFORE they cause failures
# Enhancement to Ralph Wiggum methodology:
# - Scan for security issues
# - Detect dead code
# - Find code smells
# - Record findings in RAG for learning

on:
  schedule:
    # Run daily at 3 AM UTC (low activity time)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Type of scan"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - security
          - dead_code
          - code_quality

env:
  PYTHON_VERSION: "3.11"

  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
jobs:
  # Job 1: Security scanning
  security-scan:
    runs-on: ubuntu-latest
    outputs:
      issues_found: ${{ steps.scan.outputs.issues_found }}
      issue_count: ${{ steps.scan.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        id: scan
        continue-on-error: true
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY

          # Run bandit on src and scripts
          bandit -r src/ scripts/ -f json -o bandit_report.json 2>/dev/null || true

          # Count issues
          if [ -f bandit_report.json ]; then
            count=$(python3 -c "import json; d=json.load(open('bandit_report.json')); print(len(d.get('results', [])))")
            echo "count=$count" >> $GITHUB_OUTPUT

            if [ "$count" -gt 0 ]; then
              echo "issues_found=true" >> $GITHUB_OUTPUT
              echo "⚠️ Found $count potential security issues" >> $GITHUB_STEP_SUMMARY

              # Show high severity issues
              python3 -c "import json; [print(f\"- [{i.get('issue_severity','?')}] {i.get('filename','?')}:{i.get('line_number',0)} - {i.get('issue_text','?')}\") for i in json.load(open('bandit_report.json')).get('results', [])[:5]]"
            else
              echo "issues_found=false" >> $GITHUB_OUTPUT
              echo "✅ No security issues found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "issues_found=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

  # Job 2: Dead code detection
  dead-code-scan:
    runs-on: ubuntu-latest
    outputs:
      dead_code_found: ${{ steps.scan.outputs.found }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install vulture
        run: pip install vulture

      - name: Run dead code scan
        id: scan
        continue-on-error: true
        run: |
          echo "## Dead Code Scan" >> $GITHUB_STEP_SUMMARY

          # Run vulture with min confidence
          vulture src/ scripts/ --min-confidence 80 > vulture_report.txt 2>&1 || true

          count=$(wc -l < vulture_report.txt)
          if [ "$count" -gt 0 ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "⚠️ Found $count potentially unused code items" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -20 vulture_report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "✅ No dead code detected" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 3: Code quality metrics
  code-quality:
    runs-on: ubuntu-latest
    outputs:
      quality_issues: ${{ steps.quality.outputs.issues }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: pip install ruff radon

      - name: Check code complexity
        id: quality
        run: |
          echo "## Code Quality Metrics" >> $GITHUB_STEP_SUMMARY

          # Check cyclomatic complexity
          echo "### Cyclomatic Complexity (High complexity functions)" >> $GITHUB_STEP_SUMMARY
          radon cc src/ scripts/ -a -s -n C 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "All functions have acceptable complexity" >> $GITHUB_STEP_SUMMARY

          # Check maintainability index
          echo "### Maintainability Index (Low scores)" >> $GITHUB_STEP_SUMMARY
          radon mi src/ scripts/ -s -n B 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "All files have good maintainability" >> $GITHUB_STEP_SUMMARY

          # Extended ruff checks
          echo "### Ruff Extended Checks" >> $GITHUB_STEP_SUMMARY
          ruff check src/ scripts/ --select=C90,PLR --statistics 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY || echo "No complexity issues" >> $GITHUB_STEP_SUMMARY

          echo "issues=false" >> $GITHUB_OUTPUT

  # Job 4: Generate digest and trigger fixes if needed
  generate-digest:
    runs-on: ubuntu-latest
    needs: [security-scan, dead-code-scan, code-quality]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate proactive scan digest
        id: digest
        run: |
          echo "## 🔍 Ralph Proactive Scanner Digest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.outputs.issues_found == 'true' && '⚠️ Issues found' || '✅ Clean' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dead Code | ${{ needs.dead-code-scan.outputs.dead_code_found == 'true' && '⚠️ Found' || '✅ Clean' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.code-quality.outputs.quality_issues == 'true' && '⚠️ Issues' || '✅ Good' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🤖 Scan completed at $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY

          # Determine if we need to trigger Ralph Loop
          if [ "${{ needs.security-scan.outputs.issues_found }}" == "true" ] || \
             [ "${{ needs.dead-code-scan.outputs.dead_code_found }}" == "true" ]; then
            echo "needs_action=true" >> $GITHUB_OUTPUT
          else
            echo "needs_action=false" >> $GITHUB_OUTPUT
          fi

      - name: Update workflow health dashboard
        run: |
          mkdir -p data/workflow_health
          cat > data/workflow_health/latest_scan.json << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "security_clean": ${{ needs.security-scan.outputs.issues_found != 'true' }},
            "security_issues": ${{ needs.security-scan.outputs.issue_count || 0 }},
            "dead_code_clean": ${{ needs.dead-code-scan.outputs.dead_code_found != 'true' }},
            "quality_good": ${{ needs.code-quality.outputs.quality_issues != 'true' }},
            "overall_healthy": ${{ needs.security-scan.outputs.issues_found != 'true' && needs.dead-code-scan.outputs.dead_code_found != 'true' }}
          }
          EOF

          git config user.name "ralph-bot[bot]"
          git config user.email "ralph-bot[bot]@users.noreply.github.com"
          git add data/workflow_health/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(ralph): Update workflow health dashboard" || true
            git push || true
          fi

      - name: Record findings in lessons
        if: needs.security-scan.outputs.issues_found == 'true' || needs.dead-code-scan.outputs.dead_code_found == 'true'
        run: |
          DATE=$(date +%Y%m%d)
          LESSON_FILE="rag_knowledge/lessons_learned/ll_proactive_scan_${DATE}.md"
          mkdir -p rag_knowledge/lessons_learned

          cat > "$LESSON_FILE" << EOF
          # Ralph Proactive Scan Findings

          **Date:** $(date +%Y-%m-%d)
          **Type:** Automated Proactive Scan

          ## Issues Found

          - Security issues: ${{ needs.security-scan.outputs.issue_count || '0' }}
          - Dead code detected: ${{ needs.dead-code-scan.outputs.dead_code_found || 'false' }}

          ## Action Required

          Review the workflow run summary for details and prioritize fixes.
          EOF

          git add "$LESSON_FILE" || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(ralph): Record proactive scan findings" || true
            git push || true
          fi

      - name: Trigger Ralph Loop if issues found
        if: steps.digest.outputs.needs_action == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "::notice::Issues found - triggering Ralph Loop for auto-fix"
          gh workflow run ralph-loop-ai.yml -f task=improve_code || echo "Could not trigger Ralph Loop"
