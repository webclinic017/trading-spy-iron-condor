name: Iron Condor Autonomous System

# This is the ONLY way trades happen. CTO cannot bypass this.
# Per LL-306: "Trust the guardrails, not the agent"

on:
  schedule:
    # Scan at 9:45 AM ET (14:45 UTC) Mon-Fri
    - cron: "45 14 * * 1-5"
    # Retry scan at 12:30 PM ET (17:30 UTC) Mon-Fri
    - cron: "30 17 * * 1-5"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to take"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - status
          - force_scan

# Prevent concurrent trade execution (LL-281 race condition fix)
concurrency:
  group: global-trade-execution
  cancel-in-progress: false

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  autonomous-trading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-minimal.txt

      - name: Check market hours
        id: market
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python3 << 'PYTHON'
          import os
          from alpaca.trading.client import TradingClient

          api_key = os.environ.get('ALPACA_PAPER_TRADING_API_KEY')
          secret = os.environ.get('ALPACA_PAPER_TRADING_API_SECRET')
          client = TradingClient(api_key, secret, paper=True)

          clock = client.get_clock()
          print(f"Market open: {clock.is_open}")
          print(f"Next open: {clock.next_open}")
          print(f"Next close: {clock.next_close}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'is_open={"true" if clock.is_open else "false"}\n')

          if not clock.is_open:
              print("⏸️ Market is closed — skipping trade scan")
          PYTHON

      - name: Check positions first
        if: steps.market.outputs.is_open == 'true'
        id: positions
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python3 << 'PYTHON'
          import os
          from alpaca.trading.client import TradingClient
          from src.core.trading_constants import MAX_POSITIONS

          api_key = os.environ.get('ALPACA_PAPER_TRADING_API_KEY')
          secret = os.environ.get('ALPACA_PAPER_TRADING_API_SECRET')
          client = TradingClient(api_key, secret, paper=True)
          max_ic = max(1, int(MAX_POSITIONS) // 4)

          positions = client.get_all_positions()
          spy_options = [p for p in positions if p.symbol.startswith('SPY') and len(p.symbol) > 5]
          ic_count = len(spy_options) // 4

          print(f"Current IC positions: {ic_count}")
          print(f"Max allowed (derived): {max_ic}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'ic_count={ic_count}\n')
              f.write(f'can_trade={"true" if ic_count < max_ic else "false"}\n')
          PYTHON

      - name: Scan for opportunity
        if: steps.market.outputs.is_open == 'true' && steps.positions.outputs.can_trade == 'true'
        id: scan
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python3 << 'PYTHON'
          import json
          import os
          import sys
          sys.path.insert(0, '.')

          from scripts.iron_condor_scanner import scan_for_opportunity
          result = scan_for_opportunity(dry_run=False)

          if result:
              print(f"✅ Opportunity found: {result['expiry']}")
              with open('opportunity.json', 'w') as f:
                  json.dump(result, f)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('found=true\n')
          else:
              print("No opportunity found")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('found=false\n')
          PYTHON

      - name: Execute trade (AUTONOMOUS)
        if: steps.market.outputs.is_open == 'true' && steps.scan.outputs.found == 'true'
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python3 << 'PYTHON'
          import json
          import os
          import sys
          sys.path.insert(0, '.')

          from alpaca.trading.client import TradingClient
          from alpaca.trading.enums import OrderClass, OrderSide, TimeInForce
          from alpaca.trading.requests import MarketOrderRequest, OptionLegRequest

          # Load opportunity
          with open('opportunity.json') as f:
              opp = json.load(f)

          strikes = opp['strikes']
          expiry = opp['expiry'].replace('-', '')[2:]  # YYMMDD

          def build_sym(strike, opt_type):
              return f"SPY{expiry}{opt_type}{int(strike * 1000):08d}"

          long_put = build_sym(strikes['long_put'], 'P')
          short_put = build_sym(strikes['short_put'], 'P')
          short_call = build_sym(strikes['short_call'], 'C')
          long_call = build_sym(strikes['long_call'], 'C')

          print(f"Executing IC: {long_put}/{short_put} | {short_call}/{long_call}")

          api_key = os.environ.get('ALPACA_PAPER_TRADING_API_KEY')
          secret = os.environ.get('ALPACA_PAPER_TRADING_API_SECRET')
          client = TradingClient(api_key, secret, paper=True)

          # Validate symbols exist before submitting order
          from alpaca.data.historical.option import OptionHistoricalDataClient
          from alpaca.data.requests import OptionSnapshotRequest
          opts_client = OptionHistoricalDataClient(api_key, secret)
          symbols = [long_put, short_put, short_call, long_call]
          snaps = opts_client.get_option_snapshot(OptionSnapshotRequest(symbol_or_symbols=symbols))
          missing = [s for s in symbols if s not in snaps]
          if missing:
              print(f"❌ ABORT: symbols not found on Alpaca: {missing}")
              import sys; sys.exit(1)
          print(f"✅ All 4 symbols validated on Alpaca")

          legs = [
              OptionLegRequest(symbol=long_put, side=OrderSide.BUY, ratio_qty=1),
              OptionLegRequest(symbol=short_put, side=OrderSide.SELL, ratio_qty=1),
              OptionLegRequest(symbol=short_call, side=OrderSide.SELL, ratio_qty=1),
              OptionLegRequest(symbol=long_call, side=OrderSide.BUY, ratio_qty=1),
          ]

          # 2 contracts per IC: $1,600 max risk (under 5% of $101K)
          order = client.submit_order(MarketOrderRequest(
              qty=2,
              order_class=OrderClass.MLEG,
              legs=legs,
              time_in_force=TimeInForce.DAY,
          ))

          print(f"✅ Order submitted: {order.id} - {order.status}")

          # Save entry credit for Guardian (prevents mis-estimation bug)
          expiry_key = f"IC_{opp['expiry'].replace('-', '')[2:]}"
          entries_file = 'data/ic_entries.json'
          try:
              with open(entries_file) as f:
                  ic_entries = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              ic_entries = {}
          credit = abs(float(order.filled_avg_price)) if order.filled_avg_price else 2.00
          ic_entries[expiry_key] = {
              "credit": credit,
              "order_id": str(order.id),
              "date": opp.get("timestamp", ""),
              "strikes": strikes,
          }
          with open(entries_file, 'w') as f:
              json.dump(ic_entries, f, indent=2)
          print(f"✅ Saved entry credit ${credit:.2f} to {entries_file}")
          PYTHON

      - name: Record trade in session decisions
        if: steps.market.outputs.is_open == 'true' && steps.scan.outputs.found == 'true'
        run: |
          python3 << 'PYTHON'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          decisions_file = Path(f"data/session_decisions_{today}.json")
          decisions_file.parent.mkdir(parents=True, exist_ok=True)

          opp = {}
          if Path("opportunity.json").exists():
              with open("opportunity.json") as f:
                  opp = json.load(f)

          now = datetime.now(timezone.utc).isoformat()
          new_decision = {
              "ticker": "SPY",
              "timestamp": now,
              "gate_reached": 5,
              "decision": "EXECUTED",
              "rejection_reason": None,
              "indicators": {
                  "expiry": opp.get("expiry", ""),
                  "dte": opp.get("dte", 0),
                  "vix_status": opp.get("vix_status", ""),
                  "source": "iron-condor-autonomous-workflow",
              },
              "order_details": {
                  "strikes": opp.get("strikes", {}),
                  "pricing": opp.get("pricing", {}),
              },
          }

          if decisions_file.exists():
              with open(decisions_file) as f:
                  payload = json.load(f)
          else:
              payload = {
                  "session": {
                      "date": today,
                      "session_id": datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%S"),
                      "session_type": "autonomous_workflow",
                      "is_market_day": True,
                  },
                  "decisions": [],
              }

          payload["decisions"].append(new_decision)
          payload["session"]["orders_placed"] = payload["session"].get("orders_placed", 0) + 1
          with open(decisions_file, "w") as f:
              json.dump(payload, f, indent=2)
          print(f"✅ Recorded EXECUTED decision in {decisions_file}")
          PYTHON

      - name: Commit trade data
        if: steps.market.outputs.is_open == 'true' && steps.scan.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/session_decisions_*.json data/ic_entries.json
          git diff --cached --quiet || git commit -m "fix: record autonomous IC trade data"
          git push || echo "Push failed - data will sync on next workflow"

      - name: Log trade
        if: steps.market.outputs.is_open == 'true' && steps.scan.outputs.found == 'true'
        run: |
          echo "Trade executed autonomously by workflow"
          echo "CTO did not touch this - Phil Town Rule #1 enforced"
