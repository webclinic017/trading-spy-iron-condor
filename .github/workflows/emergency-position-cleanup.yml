name: Emergency Position Cleanup

# Automatically closes excess positions to restore compliance with canonical limits:
# - Max 8 open option legs (typically ~2 iron condors)
# - Dynamic cumulative risk cap from core constants (currently 10%)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual trades)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  cleanup:
    name: Close Excess Positions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install alpaca-py

      - name: Run Emergency Cleanup
        if: inputs.dry_run == 'false'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: python scripts/emergency_position_cleanup.py

      - name: Dry Run - Analysis Only
        if: inputs.dry_run == 'true'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python3 << 'EOF'
          import os
          from alpaca.trading.client import TradingClient
          from src.core.trading_constants import MAX_CUMULATIVE_RISK_PCT, MAX_POSITIONS

          client = TradingClient(
              os.environ['ALPACA_API_KEY'],
              os.environ['ALPACA_SECRET_KEY'],
              paper=True
          )
          max_short_legs = max(1, int(MAX_POSITIONS) // 2)

          account = client.get_account()
          print(f"Account Equity: ${float(account.equity):,.2f}")

          positions = client.get_all_positions()
          print(f"\nPositions ({len(positions)}):")

          short_count = 0
          for pos in positions:
              qty = float(pos.qty)
              side = "LONG" if qty > 0 else "SHORT"
              if qty < 0:
                  short_count += 1
              print(f"  {pos.symbol} | {side} {abs(qty):.0f} | P/L: ${float(pos.unrealized_pl):+.2f}")

          print(f"\nShort option legs: {short_count}")
          print(f"Max short legs allowed (derived): {max_short_legs}")
          print(f"Excess short legs: {max(0, short_count - max_short_legs)}")
          print(f"Cumulative risk cap (canonical): {MAX_CUMULATIVE_RISK_PCT:.0%}")

          if short_count > max_short_legs:
              print("\n⚠️  DRY RUN: Would close excess short legs")
          else:
              print("\n✅ DRY RUN: No excess positions")
          EOF

      - name: Trigger State Sync
        if: inputs.dry_run == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sync-alpaca-status.yml',
              ref: 'main'
            });
            console.log('Triggered sync-alpaca-status.yml');
