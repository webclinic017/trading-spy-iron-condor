name: Event Router

on:
  # Trigger on key events
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  schedule:
    # Run once daily at 6 AM ET (11 UTC) for scheduled dispatch
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      event_type:
        description: "Manual event type to route"
        type: choice
        options:
          - ci-failure
          - dependency-update
          - test-coverage
          - health-check

jobs:
  # Route 1: CI Failure -> Self-Healing
  route-ci-failure:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.event_type == 'ci-failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch self-healing
        run: |
          echo "CI failure detected -- dispatching self-healing agent"
          gh workflow run self-healing-auto-fix.yml
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  # Route 2: Dependabot PR -> Auto-review
  route-dependency-update:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.event_type == 'dependency-update')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-review dependabot PR
        run: |
          echo "Dependabot PR detected -- auto-reviewing"
          PR_NUM=${{ github.event.pull_request.number }}
          # Check if tests pass on the PR
          gh pr checks $PR_NUM --watch --fail-fast || exit 1
          # If all checks pass, approve
          gh pr review $PR_NUM --approve --body "Auto-approved: all checks passed"
          echo "Dependabot PR #$PR_NUM approved"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  # Route 3: Scheduled -> Test Coverage Agent
  route-test-coverage:
    if: >
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.event_type == 'test-coverage')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov 2>/dev/null || pip install pytest pytest-cov
      - name: Identify uncovered modules
        run: |
          echo "Scanning for uncovered modules..."
          python3 scripts/find_uncovered_modules.py
      - name: Report coverage gaps
        run: |
          if [ -f data/coverage_gaps.json ]; then
            echo "Coverage gaps found:"
            cat data/coverage_gaps.json | python3 -m json.tool
          fi

  # Route 4: Health Check
  route-health-check:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.event_type == 'health-check')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch health monitor
        run: |
          echo "Manual health check -- dispatching monitor"
          gh workflow run self-healing-monitor.yml
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
