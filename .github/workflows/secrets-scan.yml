name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure PR base/head commits are available
        if: github.event_name == 'pull_request'
        run: |
          # Ensure follow-up fetches authenticate even if checkout's extraheader isn't honored.
          # (Some git fetch invocations otherwise prompt for username and fail in CI.)
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}
          git fetch --no-tags origin +refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }}

      - name: Scan for hardcoded secrets
        run: |
          echo "🔒 Scanning for hardcoded secrets..."

          FOUND=0

          # Scan all Python, JS, TS, shell, and config files
          FILES=$(find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.sh" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./.venv/*" \
            -not -path "./venv/*")

          for file in $FILES; do
            # Check for os.environ.get with dangerous defaults
            if grep -qE 'os\.environ\.get\s*\(\s*["\x27][^"]*KEY[^"]*["\x27]\s*,\s*["\x27][A-Za-z0-9]{16,}["\x27]' "$file" 2>/dev/null; then
              echo "🚨 FOUND: Hardcoded KEY default in $file"
              grep -nE 'os\.environ\.get.*KEY.*,' "$file" | head -3
              FOUND=1
            fi

            if grep -qE 'os\.environ\.get\s*\(\s*["\x27][^"]*SECRET[^"]*["\x27]\s*,\s*["\x27][A-Za-z0-9]{16,}["\x27]' "$file" 2>/dev/null; then
              echo "🚨 FOUND: Hardcoded SECRET default in $file"
              grep -nE 'os\.environ\.get.*SECRET.*,' "$file" | head -3
              FOUND=1
            fi

            if grep -qE 'os\.environ\.get\s*\(\s*["\x27][^"]*TOKEN[^"]*["\x27]\s*,\s*["\x27][A-Za-z0-9]{16,}["\x27]' "$file" 2>/dev/null; then
              echo "🚨 FOUND: Hardcoded TOKEN default in $file"
              grep -nE 'os\.environ\.get.*TOKEN.*,' "$file" | head -3
              FOUND=1
            fi

            # Check for Alpaca-specific key patterns (starts with PK)
            if grep -qE 'PK[A-Z0-9]{10,}' "$file" 2>/dev/null; then
              # Exclude if it's in a comment or string that says "example"
              if ! grep -qE '(example|placeholder|dummy|fake|test).*PK[A-Z0-9]' "$file" 2>/dev/null; then
                echo "🚨 FOUND: Potential Alpaca API key in $file"
                grep -nE 'PK[A-Z0-9]{10,}' "$file" | head -3
                FOUND=1
              fi
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "🛑 BUILD FAILED: Hardcoded secrets detected!"
            echo ""
            echo "NEVER use default values for credentials in os.environ.get()"
            echo ""
            echo "WRONG:  API_KEY = os.environ.get('KEY', 'actual_secret')"
            echo "RIGHT:  API_KEY = os.environ.get('KEY')"
            echo "        if not API_KEY: raise ValueError('KEY required')"
            echo ""
            echo "Incident reference: GitGuardian alert Feb 3, 2026"
            echo "═══════════════════════════════════════════════════════════════"
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"

      - name: Run Gitleaks (backup scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
