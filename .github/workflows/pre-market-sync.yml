name: Pre-Market Data Sync

on:
  schedule:
    # Run at 9:25 AM ET (14:25 UTC) - 5 minutes before market open
    - cron: "25 14 * * 1-5"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: pre-market-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to push commits

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-minimal.txt

      - name: Sync Alpaca State
        env:
          # Use paper trading keys for data sync (read-only operations)
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          APCA_API_KEY_ID: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          APCA_API_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python scripts/sync_alpaca_state.py

      - name: Verify Data Freshness
        run: |
          python -c "
          from src.utils.staleness_guard import check_data_staleness
          result = check_data_staleness()
          print(f'Data age: {result.hours_old:.2f} hours')
          if result.is_stale:
              print(f'WARNING: {result.reason}')
              exit(1)
          print('✅ Data is fresh')
          "

      - name: Record Heartbeat
        run: |
          python -c "
          from src.utils.heartbeat import record_heartbeat
          record_heartbeat('pre_market_sync', status='success')
          print('💓 Heartbeat recorded')
          "

      - name: Commit and Create PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Check if there are changes
          git add data/system_state.json data/heartbeat.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create unique branch
          BRANCH="auto/pre-market-sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: Pre-market data sync [auto]"
          git push -u origin "$BRANCH"

          # Create and merge PR using gh CLI
          PR_URL=$(gh pr create --title "chore: Pre-market sync [auto]" --body "Automated pre-market data sync" --head "$BRANCH" --base main)
          echo "Created PR: $PR_URL"

          # Auto-merge
          gh pr merge "$BRANCH" --squash --delete-branch --admin
          echo "PR merged and branch deleted"
