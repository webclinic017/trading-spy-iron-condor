name: Weekend Research

on:
  schedule:
    # Run every Saturday at 6am UTC (1am EST / 10pm PST Friday)
    - cron: 0 6 * * 6
  workflow_dispatch: {}

permissions:
  contents: write

env:
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
jobs:
  research:
    name: Run GPU Backtest + Perplexity Research
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore GPU backtest cache
        uses: actions/cache@v5
        with:
          path: |
            data/gpu_backtests/cache
            data/gpu_backtests/price_cache
          key: gpu-backtest-${{ runner.os }}-${{ hashFiles('src/compute/gpu_backtest.py') }}
          restore-keys: |
            gpu-backtest-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache: pip

      - name: Install dependencies
        run: |
          pip install httpx numba numpy yfinance pandas anthropic

      - name: Check API keys
        run: |
          if [ -z "$PERPLEXITY_API_KEY" ]; then
            echo "::error::PERPLEXITY_API_KEY not configured - research cannot proceed"
            exit 1
          else
            echo "✅ Perplexity API key configured"
          fi
          echo "✅ GPU backtest will run (CPU fallback if no CUDA)"

      - name: Create data directories
        run: |
          mkdir -p data/research/backtests
          mkdir -p rag_knowledge/backtests

      - name: Run weekend research (GPU + Perplexity)
        id: research
        run: |
          python -c "
          import asyncio
          import sys
          sys.path.insert(0, '.')
          from src.agents.research_agent import run_weekend_research

          result = asyncio.run(run_weekend_research())

          # Parse combined results
          gpu = result.get('gpu_backtest', {})
          ppl = result.get('perplexity_research', {})
          insights = result.get('combined_insights', [])

          print(f'GPU Backtest: {gpu.get(\"status\", \"N/A\")}')
          if gpu.get('status') == 'completed':
              print(f'  - Parameters tested: {gpu.get(\"parameters_tested\", 0)}')
              print(f'  - Best win rate: {gpu.get(\"best_win_rate\", 0):.1f}%')
              bp = gpu.get('best_params', {})
              print(f'  - Best setup: {bp.get(\"delta\")}-delta, {bp.get(\"dte\")} DTE')

          print(f'Perplexity Research: {ppl.get(\"status\", \"N/A\") if ppl else \"N/A\"}')
          if ppl and ppl.get('status') == 'completed':
              print(f'  - Queries run: {ppl.get(\"queries_run\", 0)}')
              print(f'  - RAG lessons: {ppl.get(\"rag_lessons_created\", 0)}')

          print(f'Combined Insights: {len(insights)}')

          # Output for GitHub Actions
          import os
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f'gpu_status={gpu.get(\"status\", \"unknown\")}\\n')
              f.write(f'perplexity_status={ppl.get(\"status\", \"unknown\") if ppl else \"skipped\"}\\n')
              f.write(f'insights_count={len(insights)}\\n')
          "

      - name: Commit research results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Add research outputs
          git add data/research/ rag_knowledge/backtests/ data/system_state.json || true

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No research changes to commit"
          else
            git commit -m "research: GPU backtest + Perplexity analysis $(date +%Y-%m-%d)

            Phase 1: GPU-accelerated parameter grid search (360+ combinations)
            Phase 2: Perplexity Deep Research for market context
            Phase 3: Combined insights → system_state.json

            Results feed into RAG system for continuous learning."

            git push
            echo "Research results committed and pushed"
          fi

      - name: Upload research artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: research-results-${{ github.run_number }}
          path: |
            data/research/
            rag_knowledge/backtests/
          retention-days: 30

      - name: Summary
        run: |
          echo "## 🧪 Weekend Research Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f data/research/latest_research_summary.json ]; then
            cat data/research/latest_research_summary.json | python -c "
          import sys, json
          data = json.load(sys.stdin)

          # GPU Backtest section
          gpu = data.get('gpu_backtest', {})
          print('### 🚀 GPU Backtest')
          if gpu.get('status') == 'completed':
              bp = gpu.get('best_params', {})
              print(f'- **Compute**: {gpu.get(\"compute\", \"CPU\")} mode')
              print(f'- **Parameters Tested**: {gpu.get(\"parameters_tested\", 0)}')
              print(f'- **Best Win Rate**: {gpu.get(\"best_win_rate\", 0):.1f}%')
              print(f'- **Recommended Setup**: {bp.get(\"delta\")}-delta, {bp.get(\"dte\")} DTE, \${bp.get(\"width\")} wide')
              print(f'- **VaR 95%**: \${gpu.get(\"var_95\", 0):.2f}')
          else:
              print(f'- Status: {gpu.get(\"status\", \"N/A\")}')
          print()

          # Perplexity section
          ppl = data.get('perplexity_research', {})
          print('### 🔍 Perplexity Research')
          if ppl and ppl.get('status') == 'completed':
              print(f'- **Queries Run**: {ppl.get(\"queries_run\", 0)}')
              print(f'- **High Confidence**: {ppl.get(\"high_confidence_results\", 0)}')
              print(f'- **RAG Lessons**: {ppl.get(\"rag_lessons_created\", 0)}')
          else:
              print(f'- Status: {ppl.get(\"status\", \"skipped\") if ppl else \"skipped\"}')
          print()

          # Combined insights
          insights = data.get('combined_insights', [])
          if insights:
              print('### 💡 Combined Insights')
              for i in insights:
                  wr = f' ({i.get(\"win_rate\", 0):.0f}% win rate)' if i.get('win_rate') else ''
                  print(f'- **{i[\"parameter\"]}**: {i[\"value\"]} (confidence: {i[\"confidence\"]:.0%}){wr}')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "No research summary available" >> $GITHUB_STEP_SUMMARY
          fi
