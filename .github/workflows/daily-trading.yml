      # ========================================================================
      # SPY-ONLY ENFORCEMENT (Updated Feb 2, 2026)
      # CHANGED: Auto-close non-SPY positions instead of blocking
      # Previous behavior (LL-272) blocked trading, causing 0% win rate
      # New behavior: Self-healing - close violations and continue
      # ========================================================================
      - name: Auto-Close Non-SPY Positions (Self-Healing)
        id: spy_only_check
        if: steps.check_execution.outputs.skip != 'true' && steps.credential_check.outputs.credentials_valid == 'true'
        timeout-minutes: 5
        env:
          ALPACA_API_KEY: ${{ github.event.inputs.trading_mode == 'live' && secrets.ALPACA_BROKERAGE_TRADING_API_KEY || secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ github.event.inputs.trading_mode == 'live' && secrets.ALPACA_BROKERAGE_TRADING_API_SECRET || secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          echo "🔒 ========================================"
          echo "🔒 SPY-ONLY ENFORCEMENT (Self-Healing)"
          echo "🔒 CLAUDE.md: 'SPY ONLY - NO individual stocks'"
          echo "🔒 Auto-closes non-SPY positions instead of blocking"
          echo "🔒 ========================================"
          echo ""
          python3 << 'SELFHEAL'
          import os
          import sys
          from alpaca.trading.client import TradingClient
          from alpaca.trading.requests import MarketOrderRequest
          from alpaca.trading.enums import OrderSide, TimeInForce

          client = TradingClient(
              os.environ['ALPACA_API_KEY'],
              os.environ['ALPACA_SECRET_KEY'],
              paper=True
          )

          positions = client.get_all_positions()
          print(f"Total positions: {len(positions)}")

          violations = []
          for pos in positions:
              symbol = pos.symbol
              if symbol == "SPY" or symbol.startswith("SPY"):
                  print(f"  ✅ {symbol}")
                  continue
              violations.append(pos)
              print(f"  ⚠️ NON-SPY: {symbol} (qty: {pos.qty})")

          if not violations:
              print("\n✅ COMPLIANT - All positions are SPY")
              sys.exit(0)

          print(f"\n🔧 AUTO-HEALING: Closing {len(violations)} non-SPY position(s)")

          closed = 0
          for pos in violations:
              symbol = pos.symbol
              qty = float(pos.qty)

              if qty < 0:
                  order_side = OrderSide.BUY
                  order_qty = abs(qty)
              else:
                  order_side = OrderSide.SELL
                  order_qty = abs(qty)

              # Handle fractional shares
              if order_qty < 1 and not symbol.startswith("SPY"):
                  print(f"  Closing fractional {symbol}: {order_side.value} {order_qty}")
              else:
                  order_qty = int(order_qty) if order_qty >= 1 else order_qty
                  print(f"  Closing {symbol}: {order_side.value} {order_qty}")

              try:
                  order = client.submit_order(MarketOrderRequest(
                      symbol=symbol,
                      qty=order_qty,
                      side=order_side,
                      time_in_force=TimeInForce.DAY,
                  ))
                  print(f"    ✅ Order submitted: {order.id}")
                  closed += 1
              except Exception as e:
                  print(f"    ⚠️ Could not close: {e}")

          print(f"\n{'=' * 50}")
          print(f"SELF-HEALED: {closed}/{len(violations)} positions closed")
          print(f"{'=' * 50}")

          # Continue with trading even if some couldn't close
          # (PDT restrictions may block some closures)
          SELFHEAL

