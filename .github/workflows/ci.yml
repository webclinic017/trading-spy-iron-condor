name: CI

on:
  push:
    branches: [main]
    # Keep heavy CI focused on code changes. Auto-generated operational/reporting
    # commits are validated by their own targeted workflows.
    paths-ignore:
      - "data/**"
      - "docs/index.md"
      - "docs/_posts/**"
      - "docs/_reports/**"
      - "docs/data/rag/**"
      - "docs/lessons/**"
      - "docs/assets/snapshots/**"
      - "wiki/**"
      - "rag_knowledge/lessons_learned/**"
      - "artifacts/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

# Prevent duplicate CI runs on same branch
concurrency:
  group: ci-${{ github.ref }}
  # On PR branches, prefer newest commit and cancel superseded runs.
  # On main, allow run completion; stale-run-guard handles different-SHA cleanup.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  stale-run-guard:
    name: Stale Run Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Cancel superseded CI runs on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId;
            const currentSha = context.sha;
            const workflowName = context.workflow;
            const candidateRuns = [];

            for (const status of ["in_progress", "queued"]) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  branch: "main",
                  status,
                  per_page: 100,
                },
              );
              candidateRuns.push(...runs);
            }

            const staleRuns = candidateRuns.filter((run) => {
              if (run.name !== workflowName) return false;
              if (run.id === currentRunId) return false;
              if (run.head_sha === currentSha) return false;
              return true;
            });

            if (staleRuns.length === 0) {
              core.info("No stale CI runs found on main.");
              return;
            }

            for (const run of staleRuns) {
              await github.rest.actions.cancelWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              core.notice(
                `Cancelled stale CI run ${run.id} (head=${run.head_sha}, status=${run.status}).`,
              );
            }

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Verify pinned versions exist on PyPI
        run: python scripts/check_pypi_pins.py

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Lint blog posts (Discover compliance)
        run: python3 scripts/lint_blog_posts.py --changed --strict

      - name: AI discoverability gate (critical)
        run: |
          python3 scripts/check_ai_discoverability.py \
            --repo-root . \
            --report artifacts/devloop/ai_discoverability_report.md \
            --json-out artifacts/devloop/ai_discoverability_report.json \
            --fail-on critical

      - name: Anthropic compliance guardrail
        run: python3 scripts/check_anthropic_compliance.py

  agent-handoff-gate:
    name: Agent Handoff Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest pyyaml

      - name: Run autonomous handoff gate
        run: |
          python3 scripts/agent_handoff_gate.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --mode quick \
            --report-md artifacts/devloop/agent_handoff_gate.md \
            --report-json artifacts/devloop/agent_handoff_gate.json \
            --delegation-contract-out artifacts/devloop/delegation_contract.json \
            --fallback-plan-json artifacts/devloop/handoff_fallback_plan.json \
            --audit-jsonl artifacts/devloop/agent_handoff_audit.jsonl \
            --policy-ab-json artifacts/devloop/trading_policy_ab_metrics.json

      - name: Collect handoff A/B metrics
        if: always()
        run: |
          python3 scripts/collect_agent_handoff_ab_metrics.py collect \
            --variant "${{ vars.POLICY_AB_VARIANT || 'A' }}" \
            --gate-report artifacts/devloop/agent_handoff_gate.json \
            --policy-report artifacts/devloop/trading_policy_ab_metrics.json \
            --ci-conclusion "${{ job.status }}" \
            --summary-out artifacts/devloop/agent_handoff_ab_metrics_latest.json \
            --jsonl-out artifacts/devloop/agent_handoff_ab_metrics_history.jsonl

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-handoff-gate
          path: |
            artifacts/devloop/agent_handoff_gate.md
            artifacts/devloop/agent_handoff_gate.json
            artifacts/devloop/delegation_contract.json
            artifacts/devloop/handoff_fallback_plan.json
            artifacts/devloop/agent_handoff_audit.jsonl
            artifacts/devloop/trading_policy_ab_metrics.json
            artifacts/devloop/agent_handoff_ab_metrics_latest.json
            artifacts/devloop/agent_handoff_ab_metrics_history.jsonl

  # Added Dec 12, 2025: Workflow validation to prevent dependency issues (LL-021)
  workflow-validation:
    name: Validate Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run workflow dependency tests
        run: |
          python -m pytest tests/test_workflow_dependencies.py -v --tb=short

      - name: Validate workflow CLI contracts (ll_025 Prevention)
        run: |
          python3 tests/test_workflow_contracts.py

      - name: Enhanced Python syntax validation (ll_024 Prevention)
        run: |
          python3 tests/test_syntax_validation.py

      - name: RAG pre-deployment check
        run: |
          python scripts/rag_pre_deployment_check.py --check-workflows

      - name: Validate ticker whitelist (LL-197 Prevention)
        run: |
          python scripts/validate_ticker_whitelist.py

  north-star-cadence-alert:
    name: North Star Cadence KPI Alert
    runs-on: ubuntu-latest
    needs: workflow-validation
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Refresh weekly gate snapshot
        run: |
          python3 scripts/update_north_star_operating_plan.py

      - name: Alert on cadence KPI miss
        run: |
          python3 scripts/check_weekly_cadence_gate.py \
            --state data/system_state.json \
            --emit-github-warning \
            --fail-on none

  tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    needs: lint
    # Prevent indefinite hangs from blocking main CI.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt  # Faster CI - skip unused PyTorch/transformers
          pip install lancedb sentence-transformers  # LanceDB mandatory for CI RAG checks
          pip install pytest pytest-cov pytest-timeout coverage
      - name: Run tests with watchdog and coverage
        env:
          CORE_TIMEOUT_MINUTES: "28"
          INTEGRATION_TIMEOUT_MINUTES: "12"
          PYTEST_TIMEOUT_SECONDS: "300"
          COV_FAIL_UNDER: "15"
        run: |
          bash scripts/ci/run_all_tests.sh
      - name: RAG retrieval evaluation (LanceDB-first)
        run: |
          python3 scripts/evaluate_rag.py \
            --k 5 \
            --prefer-lancedb \
            --include-unanswerable \
            --threshold-precision 0.4 \
            --threshold-recall 0.4 \
            --threshold-mrr 0.3 \
            --threshold-utility 0.1 \
            --threshold-unanswerable-accuracy 0.67
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            artifacts/test-reports/coverage.txt
        if: always()
        continue-on-error: true  # Non-critical: artifact upload failure shouldn't fail CI
      - name: Upload test diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: test-diagnostics
          path: artifacts/test-reports/
        if: always()
        continue-on-error: true  # Non-critical: artifact upload failure shouldn't fail CI
      - name: Dead code guard (max 50 unreferenced scripts)
        run: |
          count=0
          for f in scripts/*.py; do
            base=$(basename "$f" .py)
            if [ "$base" = "__init__" ] || [ "$base" = "conftest" ]; then continue; fi
            refs=$(grep -rl "$base" src/ tests/ .github/workflows/ --include='*.py' --include='*.yml' 2>/dev/null | grep -v "$f" | head -1)
            if [ -z "$refs" ]; then count=$((count + 1)); fi
          done
          echo "Unreferenced scripts: $count"
          if [ "$count" -gt 50 ]; then
            echo "::error::Dead code threshold exceeded: $count unreferenced scripts (max 50)"
            exit 1
          fi

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --retries 5 --timeout 60 -r requirements.txt
          pip install --retries 5 --timeout 60 pytest pytest-timeout

      - name: Run smoke backtest
        run: |
          mkdir -p out
          ./scripts/run_smoke.sh tests/fixtures/fixture.csv 42 out/smoke.json
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: smoke-result
          path: out/smoke.json

