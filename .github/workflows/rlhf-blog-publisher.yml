name: RLHF Blog Publisher

on:
  workflow_dispatch:
    inputs:
      signal:
        description: Feedback signal (positive/negative)
        required: true
        type: choice
        options:
          - positive
          - negative
      context:
        description: Context around the feedback
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-blog:
    name: Publish RLHF Blog Post
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Publish blog post
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python scripts/publish_rlhf_blog.py \
            --signal "${{ inputs.signal }}" \
            --intensity "0.7" \
            --context "${{ inputs.context }}"

      - name: Publish to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          if [ -n "$LINKEDIN_ACCESS_TOKEN" ]; then
            python scripts/publish_linkedin.py \
              --signal "${{ inputs.signal }}" \
              --context "${{ inputs.context }}" || echo "LinkedIn post failed (non-blocking)"
          else
            echo "LINKEDIN_ACCESS_TOKEN not set, skipping LinkedIn post"
          fi

      - name: Commit and push blog post
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          if git diff --quiet docs/_posts/; then
            echo "No new blog posts to commit"
            exit 0
          fi

          git add docs/_posts/
          git commit -m "chore: publish RLHF blog post"
          git push

      - name: Verify blog post
        run: |
          echo "Recent blog posts:"
          ls -la docs/_posts/*.md | tail -5
