name: RLHF Blog Publisher

on:
  push:
    branches: [main]
    paths:
      - .claude/memory/feedback/feedback-log.jsonl
  workflow_dispatch:
    inputs:
      signal:
        description: Feedback signal (positive/negative)
        required: true
        type: choice
        options:
          - positive
          - negative
      context:
        description: Context around the feedback
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-blog:
    name: Publish RLHF Blog Post
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Get latest feedback (auto-trigger)
        if: ${{ github.event_name == 'push' }}
        id: feedback
        run: |
          # Get the last feedback entry
          LAST_ENTRY=$(tail -1 .claude/memory/feedback/feedback-log.jsonl 2>/dev/null || echo '{}')
          SIGNAL=$(echo "$LAST_ENTRY" | jq -r '.signal // "positive"')
          INTENSITY=$(echo "$LAST_ENTRY" | jq -r '.intensity // 0.5')

          # Get recent commit messages as context
          CONTEXT=$(git log --oneline -5 --format='%s' | head -3 | tr '\n' '; ')

          echo "signal=$SIGNAL" >> "$GITHUB_OUTPUT"
          echo "intensity=$INTENSITY" >> "$GITHUB_OUTPUT"
          echo "context=$CONTEXT" >> "$GITHUB_OUTPUT"

      - name: Use manual input (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: manual
        run: |
          echo "signal=${{ inputs.signal }}" >> "$GITHUB_OUTPUT"
          echo "intensity=0.7" >> "$GITHUB_OUTPUT"
          echo "context=${{ inputs.context }}" >> "$GITHUB_OUTPUT"

      - name: Publish blog post
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          # Determine which input source to use
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SIGNAL="${{ steps.manual.outputs.signal }}"
            INTENSITY="${{ steps.manual.outputs.intensity }}"
            CONTEXT="${{ steps.manual.outputs.context }}"
          else
            SIGNAL="${{ steps.feedback.outputs.signal }}"
            INTENSITY="${{ steps.feedback.outputs.intensity }}"
            CONTEXT="${{ steps.feedback.outputs.context }}"
          fi

          python scripts/publish_rlhf_blog.py \
            --signal "$SIGNAL" \
            --intensity "$INTENSITY" \
            --context "$CONTEXT"

      - name: Commit and push blog post
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Check for new blog posts
          if git diff --quiet docs/_posts/; then
            echo "No new blog posts to commit"
            exit 0
          fi

          git add docs/_posts/
          git commit -m "chore: Auto-publish RLHF blog post

          Triggered by feedback signal. Autonomous blog publishing.

          Co-Authored-By: GitHub Actions <noreply@github.com>"
          git push

      - name: Verify blog post
        run: |
          # List recent blog posts
          echo "Recent blog posts:"
          ls -la docs/_posts/*.md | tail -5
