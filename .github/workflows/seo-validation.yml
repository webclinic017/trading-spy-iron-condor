name: SEO Validation

on:
  pull_request:
    paths:
      - 'docs/_posts/**'
      - 'docs/_layouts/**'
      - 'docs/_includes/**'
      - 'scripts/seo_health_check.py'
  push:
    branches: [main]
    paths:
      - 'docs/_posts/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  seo-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SEO health check
        id: seo
        run: |
          python scripts/seo_health_check.py
          echo "score=$(jq -r .score data/seo_health.json)" >> $GITHUB_OUTPUT

      - name: Comment PR with SEO score
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        continue-on-error: true  # Non-critical: PR comment failure shouldn't fail SEO validation
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('data/seo_health.json', 'utf8'));

            let body = `## 🔍 SEO Health Report\n\n`;
            body += `**Score:** ${report.score}/100\n\n`;

            if (report.failed > 0) {
              body += `❌ **${report.failed} errors** must be fixed\n`;
            }
            if (report.warnings > 0) {
              body += `⚠️ ${report.warnings} warnings\n`;
            }
            if (report.issues.length === 0) {
              body += `✅ All SEO checks passed!\n`;
            }

            if (report.issues.length > 0) {
              body += `\n### Issues\n\n`;

              const errors = report.issues.filter(i => i.severity === 'error');
              if (errors.length > 0) {
                body += `#### ❌ Errors\n\n`;
                errors.forEach(issue => {
                  body += `- **${issue.file}**: ${issue.message}\n`;
                  if (issue.fix) body += `  - Fix: ${issue.fix}\n`;
                });
                body += `\n`;
              }

              const warnings = report.issues.filter(i => i.severity === 'warning');
              if (warnings.length > 0 && warnings.length <= 5) {
                body += `#### ⚠️ Warnings\n\n`;
                warnings.slice(0, 5).forEach(issue => {
                  body += `- **${issue.file}**: ${issue.message}\n`;
                });
                if (warnings.length > 5) {
                  body += `\n*...and ${warnings.length - 5} more warnings*\n`;
                }
              }
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload SEO report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: seo-report
          path: data/seo_health.json

      - name: Fail if SEO errors
        if: steps.seo.outcome == 'failure'
        run: |
          echo "❌ SEO validation failed"
          echo "See report above for details"
          exit 1

      - name: Update SEO metrics
        if: github.ref == 'refs/heads/main'
        run: |
          # Track SEO score over time
          mkdir -p data/metrics
          jq -c "{date: \"$(date -u +%Y-%m-%d)\", score: .score, errors: .failed, warnings: .warnings}" \
            data/seo_health.json >> data/metrics/seo_history.jsonl

          # Keep last 90 days
          tail -n 90 data/metrics/seo_history.jsonl > data/metrics/seo_history.tmp
          mv data/metrics/seo_history.tmp data/metrics/seo_history.jsonl

      - name: Commit SEO metrics
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain data/metrics/) ]]; then
            git add data/metrics/seo_history.jsonl
            git commit -m "chore: Update SEO metrics [skip ci]"
            git push
          fi
