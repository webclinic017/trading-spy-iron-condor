name: 📸 Capture Trading Screenshots

on:
  # Run daily at market close (4:15 PM ET = 9:15 PM UTC)
  schedule:
    - cron: "15 21 * * 1-5" # Mon-Fri only (trading days)
  workflow_run:
    workflows:
      - "Daily Trading Execution"
      - "Sync Alpaca Status"
    types:
      - completed
  # Manual trigger
  workflow_dispatch:
    inputs:
      dashboard:
        description: "Which dashboard to capture"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - alpaca
          - progress

permissions:
  contents: write

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  capture-screenshots:
    name: Capture Trading Dashboards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Pre-check whether capture is needed
        id: precheck
        run: |
          python3 <<'PY'
          import os
          import json
          from pathlib import Path
          out = Path(os.environ["GITHUB_OUTPUT"])
          state_path = Path("data/system_state.json")
          manifest_path = Path("docs/data/alpaca_snapshots.json")

          force = "${{ github.event_name }}" == "workflow_dispatch"
          if not state_path.exists():
            out.write_text("capture_needed=true\nreason=missing_state\n", encoding="utf-8")
            raise SystemExit(0)

          state = json.loads(state_path.read_text(encoding="utf-8"))
          paper = state.get("paper_account", {}) if isinstance(state, dict) else {}
          live = state.get("live_account", {}) if isinstance(state, dict) else {}
          trades_loaded = int(state.get("trades_loaded", 0) or 0)
          paper_equity = float(paper.get("current_equity", paper.get("equity", 0.0)) or 0.0)
          live_equity = float(live.get("current_equity", live.get("equity", 0.0)) or 0.0)

          if force or not manifest_path.exists():
            out.write_text("capture_needed=true\nreason=force_or_no_manifest\n", encoding="utf-8")
            raise SystemExit(0)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          prev = manifest.get("state", {}) if isinstance(manifest, dict) else {}
          prev_trades = int(prev.get("paper_trade_count", -1))
          prev_paper_equity = float(prev.get("paper_equity", -1.0))
          prev_live_equity = float(prev.get("live_equity", -1.0))
          prev_date = str(prev.get("date_utc", ""))
          today = str(state.get("meta", {}).get("last_updated", ""))[:10]
          if not today:
            today = __import__("datetime").datetime.utcnow().strftime("%Y-%m-%d")

          changed = (
            trades_loaded != prev_trades
            or abs(paper_equity - prev_paper_equity) > 0.0001
            or abs(live_equity - prev_live_equity) > 0.0001
            or today != prev_date
          )
          if changed:
            out.write_text("capture_needed=true\nreason=state_changed\n", encoding="utf-8")
          else:
            out.write_text("capture_needed=false\nreason=no_change\n", encoding="utf-8")
          PY

      - name: Install dependencies
        if: steps.precheck.outputs.capture_needed == 'true'
        run: |
          pip install playwright pillow
          playwright install chromium

      - name: Capture screenshots
        if: steps.precheck.outputs.capture_needed == 'true'
        env:
          ALPACA_PAPER_TRADING_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          ALPACA_PAPER_TRADING_5K_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_PAPER_TRADING_5K_API_SECRET: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
          ALPACA_BROKERAGE_TRADING_API_KEY: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_KEY }}
          ALPACA_BROKERAGE_TRADING_API_SECRET: ${{ secrets.ALPACA_BROKERAGE_TRADING_API_SECRET }}
        run: |
          python3 scripts/capture_trading_screenshots.py \
            --dashboard ${{ github.event.inputs.dashboard || 'all' }} \
            --publish-pages

      - name: Regenerate pages with latest snapshots
        if: steps.precheck.outputs.capture_needed == 'true'
        run: |
          python3 scripts/generate_judge_demo_page.py --repo-root . --out docs/lessons/judge-demo.html
          python3 scripts/generate_ops_status_page.py --repo-root . --out docs/lessons/ops-status.html
          python3 scripts/generate_world_class_dashboard_enhanced.py || python3 scripts/generate_world_class_dashboard.py
          python3 scripts/update_docs_index.py || true

      - name: Upload screenshots as artifacts
        if: steps.precheck.outputs.capture_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trading-screenshots-${{ github.run_number }}
          path: |
            data/screenshots/
            docs/assets/snapshots/
            docs/data/alpaca_snapshots.json
          retention-days: 30

      - name: Commit and push screenshots
        if: steps.precheck.outputs.capture_needed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/screenshots/ docs/assets/snapshots/ docs/data/alpaca_snapshots.json docs/lessons/judge-demo.html docs/lessons/ops-status.html wiki/Progress-Dashboard.md docs/index.md || true
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: publish alpaca snapshots (automated)"
            # Retry push with rebase to handle race conditions
            TARGET_BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name || 'main' }}"
            for i in 1 2 3; do
              git pull --rebase origin "$TARGET_BRANCH" && \
              git push origin HEAD:"$TARGET_BRANCH" && break
              echo "Push attempt $i failed, retrying..."
              sleep $((i * 2))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Screenshot capture failed"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
