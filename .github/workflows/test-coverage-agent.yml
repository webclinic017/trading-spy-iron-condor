name: Test Coverage Agent

on:
  schedule:
    # Run weekly on Sunday at 8 AM ET (13 UTC)
    - cron: "0 13 * * 0"
  workflow_dispatch:

jobs:
  find-gaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest 2>/dev/null || pip install pytest

      - name: Find uncovered modules
        run: python3 scripts/find_uncovered_modules.py

      - name: Upload coverage gaps report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gaps
          path: data/coverage_gaps.json
