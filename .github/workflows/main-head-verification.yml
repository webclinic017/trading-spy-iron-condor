name: Main Head Verification

on:
  push:
    branches: [main]
    paths:
      - "data/system_state.json"
      - "data/trades.json"
      - "data/runtime/**"
      - "data/north_star_weekly_history.json"
      - "data/feedback/trade_trajectories.jsonl"
      - "models/ml/trade_confidence_model.json"
      - "models/ml/feedback_model.json"
      - "models/ml/grpo_trade_policy.pt"
      - "models/ml/grpo_trade_metadata.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-head-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-generated-state:
    name: Verify Generated Trading State
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pyyaml

      - name: Verify bounded system health check
        run: |
          python - <<'PY'
          import subprocess
          import sys

          result = subprocess.run(
              [sys.executable, "scripts/system_health_check.py"],
              capture_output=True,
              text=True,
              timeout=180,
          )
          print(result.stdout)
          if result.stderr:
              print(result.stderr, file=sys.stderr)
          raise SystemExit(result.returncode)
          PY

      - name: Run generated-state regression ring
        run: |
          python -m pytest -q \
            tests/test_system_health_check.py \
            tests/test_sync_trades_to_rag.py \
            tests/test_sync_alpaca_positions.py \
            tests/test_mandatory_trade_gate.py \
            tests/test_trading_halt.py \
            tests/test_north_star_operating_plan.py \
            tests/test_workflow_contracts.py \
            tests/test_workflow_integrity.py \
            tests/test_ci_runner_wiring.py \
            tests/test_run_status.py
