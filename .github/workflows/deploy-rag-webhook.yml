name: Deploy RAG Webhook

on:
  push:
    branches:
      - main
    paths:
      - "src/agents/rag_webhook.py"
      - "src/rag/**"
      - "rag_knowledge/lessons_learned/**"
      - "Dockerfile.webhook"
      - ".github/workflows/deploy-rag-webhook.yml"
  workflow_dispatch: # Manual trigger

env:
  PROJECT_ID: igor-trading-2025-v2
  REGION: us-central1
  SERVICE_NAME: trading-rag-webhook

  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          # Extra defense-in-depth: ensure docker is logged in even if cred helpers
          # are not honored in some runner edge cases.
          gcloud auth print-access-token | docker login \
            -u oauth2accesstoken \
            --password-stdin \
            https://${{ env.REGION }}-docker.pkg.dev

      - name: Prepare Dockerfile
        run: |
          cp Dockerfile.webhook Dockerfile
          # Add timestamp to force Docker cache invalidation
          echo "# Build timestamp: $(date -u +%Y%m%d%H%M%S)" >> Dockerfile
          echo "=== Final Dockerfile ==="
          cat Dockerfile

      - name: Build Docker image locally
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          echo "Building image: $IMAGE"
          docker build --no-cache -t $IMAGE -f Dockerfile .

      - name: Push to Artifact Registry
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # FIX Jan 15, 2026: Add Alpaca credentials for real-time P/L queries
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60s \
            --set-env-vars "ALPACA_PAPER_TRADING_API_KEY=${{ secrets.ALPACA_PAPER_TRADING_API_KEY }},ALPACA_PAPER_TRADING_API_SECRET=${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }},RAG_WEBHOOK_TOKEN=${{ secrets.RAG_WEBHOOK_TOKEN }}"

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          echo "🚀 Webhook deployed to: $URL"
          echo "📝 Configure this URL in clients as RAG_WEBHOOK_URL: $URL"
