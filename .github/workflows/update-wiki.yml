name: Update Wiki (Automated)

on:
  schedule:
    # Run daily at 9:30 PM ET (after market close)
    - cron: 30 1 * * 1-5
  workflow_dispatch:
  # Trigger when system state updates
  push:
    branches: [main]
    paths:
      - data/system_state.json
      - scripts/generate_wiki_home.py
  # Also run when dashboard updates
  workflow_run:
    workflows: [Update Progress Dashboard, Sync Alpaca Status]
    types: [completed]

permissions:
  contents: write

jobs:
  update-wiki:
    name: Sync Wiki with Account Data
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install alpaca-py

      - name: Generate wiki content
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_PAPER_TRADING_API_SECRET }}
        run: |
          python scripts/generate_wiki_home.py
          echo "--- Generated Wiki Content ---"
          head -50 wiki_home.md

      - name: Clone wiki repository
        run: |
          git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki
          echo "Wiki cloned. Current Home.md:"
          head -20 wiki/Home.md || echo "No Home.md found"

      - name: Update wiki Home page
        run: |
          cp wiki_home.md wiki/Home.md
          cd wiki
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add Home.md

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to wiki - already up to date"
          else
            git commit -m "Auto-update: $(date -u +%Y-%m-%d) - Equity: $(grep 'Account Equity' ../wiki_home.md | grep -oE '\$[0-9,]+' | head -1)"
            git push
            echo "✅ Wiki updated successfully"
          fi

      - name: Verify wiki update
        run: |
          # Verify the wiki was updated by checking GitHub API
          WIKI_DATE=$(gh api repos/${{ github.repository }}/commits --jq '.[0].commit.committer.date' 2>/dev/null || echo "unknown")
          echo "Latest wiki commit: $WIKI_DATE"

      - name: Cleanup
        if: always()
        run: rm -rf wiki wiki_home.md
