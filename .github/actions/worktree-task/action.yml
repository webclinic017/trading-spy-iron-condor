name: "Worktree Task Isolation"
description: "Run a task in an isolated git worktree to prevent race conditions"
inputs:
  task-name:
    description: "Name for the worktree branch"
    required: true
  base-branch:
    description: "Branch to create worktree from"
    default: "main"
  script:
    description: "Script to run inside the worktree"
    required: true
  auto-pr:
    description: "Automatically create PR if changes detected"
    default: "false"
  pr-title:
    description: "PR title if auto-pr is true"
    default: ""

outputs:
  worktree-path:
    description: "Path to the worktree"
    value: ${{ steps.setup.outputs.worktree_path }}
  has-changes:
    description: "Whether the task produced changes"
    value: ${{ steps.check.outputs.has_changes }}
  pr-url:
    description: "URL of created PR (if auto-pr)"
    value: ${{ steps.pr.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Create isolated worktree
      id: setup
      shell: bash
      run: |
        BRANCH="agent/${{ inputs.task-name }}-$(date +%Y%m%d-%H%M%S)"
        WORKTREE_PATH="/tmp/worktree-${{ inputs.task-name }}"

        git fetch origin ${{ inputs.base-branch }}
        git worktree add -b "$BRANCH" "$WORKTREE_PATH" "origin/${{ inputs.base-branch }}"

        echo "worktree_path=$WORKTREE_PATH" >> $GITHUB_OUTPUT
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "Worktree created at $WORKTREE_PATH on branch $BRANCH"

    - name: Run task in worktree
      shell: bash
      working-directory: ${{ steps.setup.outputs.worktree_path }}
      run: ${{ inputs.script }}

    - name: Check for changes
      id: check
      shell: bash
      working-directory: ${{ steps.setup.outputs.worktree_path }}
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes"
        fi

    - name: Commit and push changes
      if: steps.check.outputs.has_changes == 'true'
      shell: bash
      working-directory: ${{ steps.setup.outputs.worktree_path }}
      run: |
        git add -A
        git commit -m "agent(${{ inputs.task-name }}): automated changes

        Co-Authored-By: Background Agent <noreply@anthropic.com>"
        git push origin HEAD

    - name: Create PR
      id: pr
      if: steps.check.outputs.has_changes == 'true' && inputs.auto-pr == 'true'
      shell: bash
      working-directory: ${{ steps.setup.outputs.worktree_path }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_TITLE="${{ inputs.pr-title }}"
        if [ -z "$PR_TITLE" ]; then
          PR_TITLE="agent(${{ inputs.task-name }}): automated changes"
        fi
        URL=$(gh pr create --title "$PR_TITLE" --body "Automated by background agent: ${{ inputs.task-name }}" --base ${{ inputs.base-branch }})
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "PR created: $URL"

    - name: Cleanup worktree
      if: always()
      shell: bash
      run: |
        git worktree remove "${{ steps.setup.outputs.worktree_path }}" --force 2>/dev/null || true
        # Only delete branch if no changes were pushed
        if [ "${{ steps.check.outputs.has_changes }}" != "true" ]; then
          git branch -D "${{ steps.setup.outputs.branch }}" 2>/dev/null || true
        fi
