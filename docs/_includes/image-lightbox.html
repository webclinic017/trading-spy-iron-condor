<style>
  .post-content img.zoomable-media,
  .home img.zoomable-media,
  .page-content img.zoomable-media {
    cursor: zoom-in;
  }

  .image-lightbox {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.78);
    z-index: 10000;
  }

  .image-lightbox.active {
    display: flex;
  }

  .image-lightbox-content {
    max-width: min(96vw, 1600px);
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .image-lightbox-close {
    align-self: flex-end;
    border: 0;
    border-radius: 999px;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 24px;
    line-height: 1;
  }

  .image-lightbox img {
    display: block;
    max-width: 100%;
    max-height: calc(92vh - 64px);
    object-fit: contain;
    background: #111;
    border-radius: 8px;
  }

  .image-lightbox-caption {
    color: #fff;
    text-align: center;
    font-size: 0.95rem;
  }
</style>

<script>
  (() => {
    if (window.__tradingImageLightboxInitialized) return;
    window.__tradingImageLightboxInitialized = true;

    const init = () => {
      const containers = document.querySelectorAll(
        ".post-content, .home, .page-content"
      );
      if (!containers.length) return;

      const lightbox = document.createElement("div");
      lightbox.className = "image-lightbox";
      lightbox.setAttribute("aria-hidden", "true");
      lightbox.innerHTML = `
        <div class="image-lightbox-content" role="dialog" aria-modal="true" aria-label="Image viewer">
          <button class="image-lightbox-close" type="button" aria-label="Close image viewer">&times;</button>
          <img alt="" />
          <div class="image-lightbox-caption"></div>
        </div>
      `;
      document.body.appendChild(lightbox);

      const closeBtn = lightbox.querySelector(".image-lightbox-close");
      const lightboxImg = lightbox.querySelector("img");
      const caption = lightbox.querySelector(".image-lightbox-caption");

      const closeLightbox = () => {
        lightbox.classList.remove("active");
        lightbox.setAttribute("aria-hidden", "true");
        lightboxImg.src = "";
        caption.textContent = "";
      };

      const openLightbox = (imgEl) => {
        const anchor = imgEl.closest("a[href]");
        const src =
          (anchor && anchor.getAttribute("href")) ||
          imgEl.getAttribute("src") ||
          imgEl.currentSrc;
        if (!src) return;
        lightboxImg.src = src;
        caption.textContent = imgEl.getAttribute("alt") || "";
        lightbox.classList.add("active");
        lightbox.setAttribute("aria-hidden", "false");
      };

      closeBtn.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && lightbox.classList.contains("active")) {
          closeLightbox();
        }
      });

      containers.forEach((container) => {
        container.querySelectorAll("img").forEach((img) => {
          if (img.dataset.noZoom === "true") return;
          if (img.closest(".image-lightbox")) return;
          img.classList.add("zoomable-media");
          if (!img.hasAttribute("tabindex")) img.setAttribute("tabindex", "0");
          img.setAttribute("role", "button");

          img.addEventListener("click", (event) => {
            event.preventDefault();
            openLightbox(img);
          });
          img.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openLightbox(img);
            }
          });
        });
      });
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init, { once: true });
    } else {
      init();
    }
  })();
</script>
