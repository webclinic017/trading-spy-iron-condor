<!-- BreadcrumbList Schema for Navigation -->
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://igorganapolsky.github.io/trading/"
      }
      {% if page.url != "/" and page.url != "/index.html" %}
      ,{
        "@type": "ListItem",
        "position": 2,
        "name": {{ page.title | default: "Page" | jsonify }},
        "item": "{{ page.url | absolute_url }}"
      }
      {% endif %}
    ]
  }
</script>
