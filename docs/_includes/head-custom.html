<!-- Mermaid.js for Architecture Diagrams -->
<meta name="robots" content="max-image-preview:large" />
<link rel="stylesheet" href="{{ '/assets/custom.css' | relative_url }}" />
<link
  rel="alternate"
  type="text/markdown"
  title="AI Trading Journey LLM Index"
  href="{{ '/llms.txt' | relative_url }}"
/>
<link
  rel="alternate"
  type="text/markdown"
  title="AI Trading Journey LLM Full Catalog"
  href="{{ '/llms-full.txt' | relative_url }}"
/>
<meta name="ai-content-index" content="{{ '/llms.txt' | relative_url }}" />

<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
  mermaid.initialize({
    startOnLoad: true,
    theme: "neutral",
    securityLevel: "loose",
    flowchart: {
      useMaxWidth: true,
      htmlLabels: true,
      curve: "basis",
    },
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const containers = document.querySelectorAll(
      ".post-content, .home, .page-content"
    );
    if (!containers.length) return;

    const lightbox = document.createElement("div");
    lightbox.className = "image-lightbox";
    lightbox.setAttribute("aria-hidden", "true");
    lightbox.innerHTML = `
      <div class="image-lightbox-content" role="dialog" aria-modal="true" aria-label="Image viewer">
        <button class="image-lightbox-close" type="button" aria-label="Close image viewer">&times;</button>
        <img alt="" />
        <div class="image-lightbox-caption"></div>
      </div>
    `;
    document.body.appendChild(lightbox);

    const closeBtn = lightbox.querySelector(".image-lightbox-close");
    const lightboxImg = lightbox.querySelector("img");
    const caption = lightbox.querySelector(".image-lightbox-caption");

    const closeLightbox = () => {
      lightbox.classList.remove("active");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImg.src = "";
      caption.textContent = "";
    };

    const openLightbox = (imgEl) => {
      const anchor = imgEl.closest("a[href]");
      const src =
        (anchor && anchor.getAttribute("href")) ||
        imgEl.getAttribute("src") ||
        imgEl.currentSrc;
      if (!src) return;
      lightboxImg.src = src;
      caption.textContent = imgEl.getAttribute("alt") || "";
      lightbox.classList.add("active");
      lightbox.setAttribute("aria-hidden", "false");
    };

    closeBtn.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.classList.contains("active")) {
        closeLightbox();
      }
    });

    containers.forEach((container) => {
      container.querySelectorAll("img").forEach((img) => {
        if (img.dataset.noZoom === "true") return;
        if (img.closest(".image-lightbox")) return;
        img.classList.add("zoomable-media");
        if (!img.hasAttribute("tabindex")) img.setAttribute("tabindex", "0");
        img.setAttribute("role", "button");

        img.addEventListener("click", (event) => {
          event.preventDefault();
          openLightbox(img);
        });
        img.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openLightbox(img);
          }
        });
      });
    });
  });
</script>

<!-- Custom styles for tech stack diagrams (keep light to avoid fighting Minima defaults) -->
<style>
  .mermaid {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
  }
  .tech-stack-section {
    border-left: 4px solid #0366d6;
    padding-left: 16px;
    margin: 24px 0;
  }
  .tech-badge {
    display: inline-block;
    padding: 4px 12px;
    background: #e1e4e8;
    border-radius: 16px;
    font-size: 0.9em;
    margin: 4px;
  }
  .tech-badge.active {
    background: #28a745;
    color: white;
  }
  .tech-badge.deprecated {
    background: #ffc107;
    color: black;
  }
</style>
